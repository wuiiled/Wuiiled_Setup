name: Merge Rules All-in-One

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      TZ: 'Asia/Shanghai'

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Tools (Mihomo & Sing-box)
      run: |
        echo "Downloading latest mihomo binary..."
        m_version=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -sL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
        curl -skLo mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/$m_version/mihomo-linux-amd64-$m_version.gz"
        gunzip mihomo.gz && chmod +x mihomo && sudo mv mihomo /usr/local/bin/mihomo
        
        #echo "Downloading latest sing-box binary..."
        #sb_version=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
        #sb_version_num=${sb_version#v}
        #curl -skLo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/$sb_version/sing-box-${sb_version_num}-linux-amd64.tar.gz"
        #tar -xzf sing-box.tar.gz
        #sudo mv sing-box-${sb_version_num}-linux-amd64/sing-box /usr/local/bin/

        echo "Downloading latest sing-box alpha/pre-release binary..."
        sb_version=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -sL https://api.github.com/repos/SagerNet/sing-box/releases | jq -r '.[0].tag_name')
        sb_version_num=${sb_version#v}
        curl -skLo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/$sb_version/sing-box-${sb_version_num}-linux-amd64.tar.gz"
        tar -xzf sing-box.tar.gz
        sudo mv sing-box-${sb_version_num}-linux-amd64/sing-box /usr/local/bin/

    - name: Run Python Builders
      run: |
        export LC_ALL=C
        PYTHONPATH=scripts python3 scripts/main.py

    - name: Deploy to Orphan Branches
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        deploy_branch() {
          local TARGET=$1
          echo "🚀 Starting deploy process for: $TARGET"
          
          local DEPLOY_DIR=$(mktemp -d)
          cd $DEPLOY_DIR
          git init -q
          git checkout -q --orphan $TARGET
          
          mkdir -p rules
          cp -a $GITHUB_WORKSPACE/output/$TARGET/. rules/ || true
          
          echo "<div align=\"center\">" > README.md
          echo "" >> README.md
          echo "# 📦 $TARGET 规则订阅导航" >> README.md
          echo "" >> README.md
          echo "<i>自动更新于：$(date +"%Y-%m-%d %H:%M:%S") (Asia/Shanghai)</i>" >> README.md
          echo "</div>" >> README.md
          echo "" >> README.md
          echo "## 💡 如何使用" >> README.md
          echo "请在下方表格中，**右键点击** \`[👉 获取直链]\`，选择 **“复制链接地址”**，贴入配置文件即可。" >> README.md
          echo "" >> README.md
          
          # 获取 rules 目录下所有的文件后缀扩展名并去重
          extensions=$(ls rules -1 | awk -F. '{if (NF>1) print $NF}' | sort -u)
          
          # 根据后缀遍历生成多个独立表格
          for ext in $extensions; do
            echo "### 📌 格式：\`.$ext\`" >> README.md
            # 增加了一列【🔢 规则数量】
            echo "| 🗂️ 规则名称 (Rule) | 🔢 规则数量 | 🔗 订阅链接 (右键复制) |" >> README.md
            echo "| :--- | :---: | :---: |" >> README.md
            
            for file in rules/*.$ext; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                rule_name="${filename%.*}"
                
                # ==========================================
                # 📊 核心：动态统计规则条数
                # ==========================================
                count="-"
                if [ "$ext" == "txt" ]; then
                  # 统计纯文本规则：忽略空行和带 # 的注释行
                  count=$(grep -cvE '^\s*(#|$)' "$file")
                elif [ "$ext" == "json" ]; then
                  # 统计 sing-box json 规则：使用 jq 深度解析数组长度
                  count=$(jq '[.rules[] | to_entries[] | .value | if type=="array" then length elif type=="string" then 1 else 0 end] | add' "$file" 2>/dev/null || echo "0")
                elif [ "$ext" == "srs" ]; then
                  # 针对 srs 二进制，回溯读取其同名的 json 文件获取数量
                  local json_file="rules/${rule_name}.json"
                  if [ -f "$json_file" ]; then
                    count=$(jq '[.rules[] | to_entries[] | .value | if type=="array" then length elif type=="string" then 1 else 0 end] | add' "$json_file" 2>/dev/null || echo "0")
                  fi
                elif [ "$ext" == "mrs" ]; then
                  # 针对 mrs 二进制，回溯读取其同名的 txt 文件获取数量
                  local txt_file="rules/${rule_name}.txt"
                  if [ -f "$txt_file" ]; then
                    count=$(grep -cvE '^\s*(#|$)' "$txt_file")
                  fi
                fi
                
                # 为数字加上千分位逗号 (如 192000 -> 192,000) 让视觉更舒适
                if [ "$count" != "-" ] && [[ "$count" =~ ^[0-9]+$ ]]; then
                  count=$(echo "$count" | sed ':a;s/\B[0-9]\{3\}\>/,&/;ta')
                fi
                # ==========================================

                url="https://raw.githubusercontent.com/${{ github.repository }}/$TARGET/rules/$filename"
                # 将数量变量 $count 填入表格
                echo "| **$rule_name** | <kbd>$count</kbd> | [👉 获取直链]($url) |" >> README.md
              fi
            done
            echo "" >> README.md
          done
          
          git add rules/ README.md
          git commit -q -m "Auto Update $TARGET $(date +"%Y-%m-%d %H:%M")" || true
          git push -f -q https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $TARGET
          
          echo "✅ Deploy completed for: $TARGET"
        }

        deploy_branch mihomo &
        deploy_branch adg &
        deploy_branch mosdns-x &
        deploy_branch singbox &
        
        wait

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 2
