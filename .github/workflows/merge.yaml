name: Merge Rules All-in-One

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: 'Asia/Shanghai'

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install mihomo (Stable Binary)
      run: |
        echo "Downloading latest mihomo binary..."
        version=$(curl -sL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
        curl -skLo mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/$version/mihomo-linux-amd64-$version.gz"
        gunzip mihomo.gz
        chmod +x mihomo
        sudo mv mihomo /usr/local/bin/mihomo
        mihomo -v

    - name: Run Python Builders
      run: |
        export LC_ALL=C
        python3 scripts/main.py

    - name: Deploy to Orphan Branches
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        deploy_branch() {
          local TARGET=$1
          echo "======================================"
          echo "🚀 Deploying to branch: $TARGET"
          
          # 创建纯净的临时目录，防止工作区污染
          local DEPLOY_DIR=$(mktemp -d)
          cd $DEPLOY_DIR
          git init
          git checkout --orphan $TARGET
          
          mkdir -p rules
          # 使用 -a 复制所有文件(包含隐藏文件)，如果目录为空也不会报错退出
          cp -a $GITHUB_WORKSPACE/output/$TARGET/. rules/ || true
          
          git add rules/
          git commit -m "Auto Update $TARGET $(date +"%Y-%m-%d %H:%M")" || true
          git push -f https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $TARGET
          
          cd $GITHUB_WORKSPACE
        }

        deploy_branch mihomo
        deploy_branch adg
        deploy_branch mosdns-x

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 2