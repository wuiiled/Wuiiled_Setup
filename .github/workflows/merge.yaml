name: Merge Rules All-in-One

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      TZ: 'Asia/Shanghai'

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Tools (Mihomo & Sing-box)
      run: |
        # 安装 Mihomo
        echo "Downloading latest mihomo binary..."
        m_version=$(curl -sL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
        curl -skLo mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/$m_version/mihomo-linux-amd64-$m_version.gz"
        gunzip mihomo.gz && chmod +x mihomo && sudo mv mihomo /usr/local/bin/mihomo
        
        # 安装 Sing-box
        echo "Downloading latest sing-box binary..."
        sb_version=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
        sb_version_num=${sb_version#v}
        curl -skLo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/$sb_version/sing-box-${sb_version_num}-linux-amd64.tar.gz"
        tar -xzf sing-box.tar.gz
        sudo mv sing-box-${sb_version_num}-linux-amd64/sing-box /usr/local/bin/

    - name: Run Python Builders
      run: |
        export LC_ALL=C
        PYTHONPATH=scripts python3 scripts/main.py

    - name: Deploy to Orphan Branches
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        deploy_branch() {
          local TARGET=$1
          echo "======================================"
          echo "🚀 Deploying to branch: $TARGET"
          
          # 创建纯净部署目录
          local DEPLOY_DIR=$(mktemp -d)
          cd $DEPLOY_DIR
          git init
          git checkout --orphan $TARGET
          
          # 拷贝规则文件
          mkdir -p rules
          cp -a $GITHUB_WORKSPACE/output/$TARGET/. rules/ || true
          
          # 📝 自动生成导航 README.md
          echo "# 📦 $TARGET 规则订阅导航" > README.md
          echo "最后自动更新时间：\`$(date +"%Y-%m-%d %H:%M:%S") (Asia/Shanghai)\`" >> README.md
          echo "" >> README.md
          echo "## 🔗 规则直链" >> README.md
          echo "你可以直接复制以下链接，贴入到你的客户端或路由器的配置文件中：" >> README.md
          echo "" >> README.md
          
          # 遍历规则目录，自动拼接直链
          for file in rules/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "- **$filename**" >> README.md
              echo "  \`https://raw.githubusercontent.com/${{ github.repository }}/$TARGET/rules/$filename\`" >> README.md
            fi
          done
          
          # 提交并强制推送
          git add rules/ README.md
          git commit -m "Auto Update $TARGET $(date +"%Y-%m-%d %H:%M")" || true
          git push -f https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $TARGET
          
          cd $GITHUB_WORKSPACE
        }

        # 依次部署四个分支
        deploy_branch mihomo
        deploy_branch adg
        deploy_branch mosdns-x
        deploy_branch singbox

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 2